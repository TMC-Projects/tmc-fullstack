version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: njara-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: njara
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d njara" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: njara-cache
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: njara-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=njara
      - DB_SSLMODE=disable
      - REDIS_ADDR=cache:6379
      - JWT_SECRET=AntigravitySecretJWTKey2026!
      - JWT_TTL=24h
      - GLOBAL_API_KEY=njara_global_landing_page_key_123
      - MIDTRANS_MERCHANT_ID=G082856386
      - MIDTRANS_CLIENT_KEY=SB-Mid-client-zOkWcEqWCdbmuoeq
      - MIDTRANS_SERVER_KEY=SB-Mid-server-xKwEPlEPQriqAyFBtNKTbqHs
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: njara-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: njara-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api

volumes:
  pgdata:
  redisdata:
  uploads_data:
